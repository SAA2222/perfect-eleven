name: Update Tournament Stats

on:
  schedule:
    # Daily 06:00 UTC = 02:00 ET — after most match days finish
    - cron: '0 6 * * *'
  workflow_dispatch:  # manual run via Actions UI

permissions:
  contents: write     # required to commit the updated live-stats.js

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest tournament stats
        run: node scripts/fetch-stats.js

      - name: Commit if changed
        run: |
          git config user.name  "Perfect Eleven Bot"
          git config user.email "bot@perfect-eleven.local"
          git add live-stats.js
          if git diff --cached --quiet; then
            echo "No changes — nothing to commit."
            exit 0
          fi
          git commit -m "stats: $(date -u +%Y-%m-%d) — live tournament update"
          git push
